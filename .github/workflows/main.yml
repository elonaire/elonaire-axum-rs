name: Techie Tenka API CI/CD

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SHARED_SERVICE_PATHS: "services/shared-service/"
  LIB_PATHS: "lib/"
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  check_shared_service_changes:
    runs-on: ubuntu-latest
    # needs: [build]
    outputs:
      shared_service_should_deploy: ${{ steps.confirm_changes.outputs.SHARED_SERVICE_SHOULD_DEPLOY }}

    permissions:
      id-token: write # required to use OIDC authentication
      contents: read # required to checkout the code from the repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: file_changes
        name: Check for Shared Service Changes
        run: |
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.sha }}"
          files_temp=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
          files=$(echo "$files_temp" | tr "\n" " ")
          echo "changed_files=$files" >> "$GITHUB_OUTPUT"

      - id: confirm_changes
        name: Confirm Changes
        shell: bash
        run: |
          echo "Changed files: ${{ steps.file_changes.outputs.changed_files }}"
          echo "If you see here files that you have not modified, please update your branch with changes from main."

          # Check if the modified files include this path
          if echo "${{ steps.file_changes.outputs.changed_files }}" | grep -q "${{ env.SHARED_SERVICE_PATHS }}"  || echo "${{ steps.file_changes.outputs.changed_files }}" | grep -q "${{ env.LIB_PATHS }}"; then
            # Set the output variable and exit the loop
            echo "triggering_path is ${{ env.SHARED_SERVICE_PATHS }}"
            echo "SHARED_SERVICE_SHOULD_DEPLOY=true" >> "$GITHUB_OUTPUT"
            cat "$GITHUB_OUTPUT"
          else
            echo "SHARED_SERVICE_SHOULD_DEPLOY=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

  build_and_deploy_shared_service:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          # - linux/arm64
    needs: [check_shared_service_changes]
    if: ${{ needs.check_shared_service_changes.outputs.shared_service_should_deploy == 'true' }}

    permissions:
      id-token: write # required to use OIDC authentication
      contents: read # required to checkout the code from the repo

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "SHARED_REGISTRY_IMAGE=registry.techietenka.com/shared-service" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SHARED_REGISTRY_IMAGE }}

      - uses: actions/checkout@v4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.techietenka.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # with:
        #   version: "lab:latest"
        #   driver: cloud
        #   endpoint: "elonaire/elonaire-builder"


      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          # context: .
          # push: true
          tags: ${{ env.SHARED_REGISTRY_IMAGE }}
          build-args: |
            SERVICE_NAME=shared-service
            PORT=3002
          platforms: ${{ matrix.platform }}
          provenance: true # enables --provenance=mode=max
          sbom: true
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-shared-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-shared-*
          merge-multiple: true

      - name: Docker meta
        id: meta-tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SHARED_REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.SHARED_REGISTRY_IMAGE }}@sha256:%s ' *)

  deploy_to_server:
    runs-on: ubuntu-latest
    needs: [build_and_deploy_shared_service]
    if: |
      always() && needs.build_and_deploy_shared_service.result != 'failure'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
            ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy manifests and configs
        run: |
              cat > k3s/manifests/ipallowlist.yaml <<'EOF'
                  apiVersion: traefik.io/v1alpha1
                  kind: Middleware
                  metadata:
                    name: surrealist-ipallowlist
                    namespace: techietenka
                  spec:
                    ipAllowList:
                      sourceRange:
                        - ${{ secrets.ALLOWED_IP_MY_MAC }}
                        - ${{ secrets.ALLOWED_IP_MY_MAC_IPV6 }}
                      ipStrategy:
                        ipv6Subnet: 64
              EOF

              scp -r k3s ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/
              scp -r mosquitto ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/

      - name: Deploy on VM
        run: |
              ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} <<'EOF'
                    set -e

                    cd /home/${{ secrets.VM_USER }}

                    # Make .sh scripts executable
                    chmod +x k3s/configs.sh

                    # Run script(s)
                    ./k3s/configs.sh

                    # Apply manifests after scripts (if needed)
                    kubectl apply -f ./k3s/manifests -R
              EOF


  automerge:
    runs-on: ubuntu-latest

    needs: [build_and_deploy_shared_service, deploy_to_server]
    if: |
      always() && (needs.build_and_deploy_shared_service.result != 'failure' && needs.deploy_to_server.result != 'failure')

    steps:
      - id: automerge
        name: automerge
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: ""
