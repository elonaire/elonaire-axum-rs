---
# surrealist-ingress-http
# Handles HTTP - redirects to HTTPS only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surrealist-ingress-http
  namespace: techietenka
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: "techietenka-redirect-to-https@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: surrealist.techietenka.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: surrealist
                port:
                  number: 8080

---
# surrealist-ingress
# UI tool - IP-restricted via allowlist + full secure-chain
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surrealist-ingress
  namespace: techietenka
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      techietenka-surrealist-ipallowlist@kubernetescrd,
      techietenka-secure-chain@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.options: "default@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: surrealist.techietenka.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: surrealist
                port:
                  number: 8080
  tls:
    - hosts:
        - surrealist.techietenka.com
      secretName: surrealist-tls-secret

---
# surrealdb-ingress-http
# Handles HTTP - redirects to HTTPS only
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surrealdb-ingress-http
  namespace: techietenka
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: "techietenka-redirect-to-https@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: surrealdb.techietenka.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: acl-db-external
                port:
                  number: 8000

---
# surrealdb-ingress
# Direct DB access - IP-restricted + secure-chain + all strip middlewares
# /payments gets its own ingress below for stricter rate limiting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surrealdb-ingress
  namespace: techietenka
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      techietenka-surrealist-ipallowlist@kubernetescrd,
      techietenka-secure-chain@kubernetescrd,
      techietenka-strip-acl@kubernetescrd,
      techietenka-strip-files@kubernetescrd,
      techietenka-strip-shared@kubernetescrd,
      techietenka-strip-email@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.options: "default@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: surrealdb.techietenka.com
      http:
        paths:
          - path: /acl
            pathType: Prefix
            backend:
              service:
                name: acl-db-external
                port:
                  number: 8000
          - path: /files
            pathType: Prefix
            backend:
              service:
                name: files-db-external
                port:
                  number: 8000
          - path: /shared
            pathType: Prefix
            backend:
              service:
                name: shared-db-external
                port:
                  number: 8000
          - path: /email
            pathType: Prefix
            backend:
              service:
                name: email-db-external
                port:
                  number: 8000
  tls:
    - hosts:
        - surrealdb.techietenka.com
      secretName: surrealdb-tls-secret

---
# surrealdb-ingress-payments
# Separated out to apply payments-chain (strict rate limiting)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surrealdb-ingress-payments
  namespace: techietenka
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      techietenka-surrealist-ipallowlist@kubernetescrd,
      techietenka-payments-chain@kubernetescrd,
      techietenka-strip-payments@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.options: "default@kubernetescrd"
    traefik.ingress.kubernetes.io/router.priority: "10"
spec:
  ingressClassName: traefik
  rules:
    - host: surrealdb.techietenka.com
      http:
        paths:
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: payments-db-external
                port:
                  number: 8000
  tls:
    - hosts:
        - surrealdb.techietenka.com
      secretName: surrealdb-tls-secret
