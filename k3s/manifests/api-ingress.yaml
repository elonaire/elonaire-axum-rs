---
# api-ingress-http
# Handles HTTP traffic - only job is to redirect to HTTPS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress-http
  namespace: techietenka
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: "techietenka-redirect-to-https@kubernetescrd"
spec:
  ingressClassName: traefik
  rules:
    - host: api.techietenka.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: acl-service
                port:
                  number: 3007

---
# api-ingress
# Handles HTTPS traffic - uses secure-chain for consistent security baseline
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: techietenka
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      techietenka-secure-chain@kubernetescrd,
      techietenka-strip-acl@kubernetescrd,
      techietenka-strip-files@kubernetescrd,
      techietenka-strip-shared@kubernetescrd,
      techietenka-strip-email@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.options: "default"
spec:
  ingressClassName: traefik
  rules:
    - host: api.techietenka.com
      http:
        paths:
          - path: /acl
            pathType: Prefix
            backend:
              service:
                name: acl-service
                port:
                  number: 3007
          - path: /files
            pathType: Prefix
            backend:
              service:
                name: files-service
                port:
                  number: 3001
          - path: /email
            pathType: Prefix
            backend:
              service:
                name: email-service
                port:
                  number: 3019
          - path: /shared
            pathType: Prefix
            backend:
              service:
                name: shared-service
                port:
                  number: 3002
  tls:
    - hosts:
        - api.techietenka.com
      secretName: api-tls-secret

---
# api-ingress-payments
# Uses payments-chain which swaps in rate-limit-strict instead of rate-limit
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress-payments
  namespace: techietenka
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      techietenka-payments-chain@kubernetescrd,
      techietenka-strip-payments@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.options: "default"
    traefik.ingress.kubernetes.io/router.priority: "10"
spec:
  ingressClassName: traefik
  rules:
    - host: api.techietenka.com
      http:
        paths:
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: payments-service
                port:
                  number: 3013
  tls:
    - hosts:
        - api.techietenka.com
      secretName: api-tls-secret
