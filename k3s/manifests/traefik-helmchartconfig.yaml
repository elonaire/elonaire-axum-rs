apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        allowEmptyServices: true
      kubernetesIngress:
        allowEmptyServices: true
        allowExternalNameServices: true
        publishedService:
          enabled: true
