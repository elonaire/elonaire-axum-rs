---
# Email Headless Service
apiVersion: v1
kind: Service
metadata:
  name: email-service-internal
  namespace: techietenka
spec:
  clusterIP: None # 👈 Headless!
  selector:
    app: email-service
  ports:
    - name: http
      port: 3019
      targetPort: 3019
    - name: grpc
      port: 50052
      targetPort: 50052
