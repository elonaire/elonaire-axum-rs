---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-acl
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /acl
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-files
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /files
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-email
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /email
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-shared
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /shared

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-payments
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /payments

---

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: techietenka
spec:
  redirectScheme:
    scheme: https
    permanent: true

---

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: techietenka
spec:
  headers:
    sslRedirect: true
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
    permissionsPolicy: "camera=(), microphone=(), geolocation=()"
    customResponseHeaders:
      X-Frame-Options: "SAMEORIGIN"
