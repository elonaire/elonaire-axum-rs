---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-acl
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /acl
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-files
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /files
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-email
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /email
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-shared
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /shared
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-payments
  namespace: techietenka
spec:
  stripPrefix:
    prefixes:
      - /payments
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: techietenka
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# Extended: added frameDeny, CSP, removed server fingerprint, X-Permitted-Cross-Domain-Policies
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: techietenka
spec:
  headers:
    sslRedirect: true
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
    contentTypeNosniff: true
    browserXssFilter: true
    frameDeny: true
    referrerPolicy: "strict-origin-when-cross-origin"
    permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    customResponseHeaders:
      X-Frame-Options: "DENY"
      X-Permitted-Cross-Domain-Policies: "none"
      Server: ""
      Content-Security-Policy: >
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: https:;
        connect-src 'self' https:;
        object-src 'none';
        base-uri 'self';
        frame-ancestors 'none';
        form-action 'self';
        upgrade-insecure-requests;

---
# NEW: Rate limiting - general public routes
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: techietenka
spec:
  rateLimit:
    average: 100
    burst: 50

---
# NEW: Stricter rate limiting for sensitive endpoints (payments, auth)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-strict
  namespace: techietenka
spec:
  rateLimit:
    average: 20
    burst: 10

---
# NEW: Simultaneous connection cap (anti-slowloris)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: conn-limit
  namespace: techietenka
spec:
  inFlightReq:
    amount: 100
    sourceCriterion:
      ipStrategy:
        depth: 1

---
# NEW: Chain for all public-facing routes
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-chain
  namespace: techietenka
spec:
  chain:
    middlewares:
      - name: redirect-to-https
      - name: security-headers
      - name: rate-limit
      - name: conn-limit

---
# NEW: Chain for payments route (strict rate limit + security headers)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: payments-chain
  namespace: techietenka
spec:
  chain:
    middlewares:
      - name: redirect-to-https
      - name: security-headers
      - name: rate-limit-strict
      - name: conn-limit
